<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI对话实验</title>
<style>
body{padding:20px;}
.boxA,.boxB{width:95%;height:700px;border:1px solid #ddd;display:none;}
</style>
<!-- 只引入一次 SDK -->
<script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.19/libs/cn/index.js"></script>
</head>
<body>
<div style="max-width:1200px;margin:0 auto 30px auto;border:1px solid #e5e5e5;padding:22px;border-radius:8px;">
<h3>实验引导</h3>
<p style="font-size:17px;line-height:1.7;">
请想象以下场景：您正在一家跨境电商平台上浏览海外商品。突然，一款来自新西兰的牛奶吸引了您的注意。由于是进口商品，您点进该页面后希望进一步了解细节后再做决定，于是点击了页面上的“联系客服”，与该平台的AI客服展开对话。
</p >
<div style="margin:20px 0;">
<img src="./milk.jpg" style="max-width:100%;border:1px solid #ccc;">
</div>
<p>阅读完毕后，请点击右下方小章鱼图标与AI客服进行对话</p >
</div>

<!-- 这里只保留显示容器，不要放 script -->
<div class="boxA">
  <h3>AI对话 - A组</h3>
</div>

<div class="boxB">
  <h3>AI对话 - B组</h3>
</div>

<script>
// 根据 URL 中的 hash 值决定显示哪个容器并初始化对应的智能体
const tag = location.hash;

if (tag === '#groupA') {
  document.querySelector('.boxA').style.display = 'block';
  // 初始化 A 组机器人
  new CozeWebSDK.WebChatClient({
    config: {
      bot_id: '7613670952009908278',
    },
    componentProps: {
      title: 'Coze A组',
    },
    auth: {
      type: 'token',
      token: 'pat_wukXmeSgxq6szu0VxVnART2Hy8yaefCGVAWUwOn7ZazxQLUv0PJ169fPypQq2Aqv',
      onRefreshToken: function () {
        return 'pat_wukXmeSgxq6szu0VxVnART2Hy8yaefCGVAWUwOn7ZazxQLUv0PJ169fPypQq2Aqv'
      }
    }
  });
}

if (tag === '#groupB') {
  document.querySelector('.boxB').style.display = 'block';
  // 初始化 B 组机器人
  new CozeWebSDK.WebChatClient({
    config: {
      bot_id: '7613306111432638473',
    },
    componentProps: {
      title: 'Coze B组',
    },
    auth: {
      type: 'token',
      token: 'pat_hhFcxbLaCTMvZh0gMylSCzXXuYzBWYKa8a3t9dvxIoOVXPVY8Kh5N25pAqNpe4MR',
      onRefreshToken: function () {
        return 'pat_hhFcxbLaCTMvZh0gMylSCzXXuYzBWYKa8a3t9dvxIoOVXPVY8Kh5N25pAqNpe4MR'
      }
    }
  });
}
</script>
</body>
</html>
